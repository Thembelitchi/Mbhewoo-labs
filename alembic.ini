# Alembic configuration for Mbhewoo Labs.
#
# The database URL is intentionally NOT stored here. It is injected at runtime
# from app/config.py (which loads .env via pydantic-settings) inside
# alembic/env.py, so secrets never live in a committed file.

[alembic]
script_location = alembic
prepend_sys_path = .
# Use a date-ordered, readable slug for new revision filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
